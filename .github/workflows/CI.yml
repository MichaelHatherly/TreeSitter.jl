name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: all builds except for builds on the `master` branch
  # Cancel intermediate builds: only pull request builds
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/master' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  actions: write
  contents: read

jobs:
  finalize:
    timeout-minutes: 10
    needs: [test, validate, dendro]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo test: ${{ needs.test.result }}
          echo validate: ${{ needs.validate.result }}
          echo dendro: ${{ needs.dendro.result }}
      - run: exit 1
        if: |
          (needs.test.result != 'success') ||
          (needs.validate.result != 'success') ||
          (needs.dendro.result != 'success')

  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'lts'
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          # Minimum version (Linux only)
          - version: 'min'
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0

      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1.7.0

      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3 # v1.11.4
        continue-on-error: ${{ matrix.version == 'nightly' }}

      - uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38 # v1.2.2

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  validate:
    name: Validate code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: '1'

      - name: Install dependencies
        run: julia --project=.ci -e 'using Pkg; Pkg.instantiate()'

      - name: Check CHANGELOG.md exists
        run: test -f CHANGELOG.md

      - name: Validate changelog links are up-to-date
        run: |
          julia --project=.ci .ci/changelog.jl
          if ! git diff --exit-code CHANGELOG.md; then
            echo "❌ Changelog links are out of date!"
            echo "Please run: just changelog-links"
            exit 1
          fi
          echo "✅ Changelog links are up-to-date"

      - name: Check code formatting
        run: |
          julia --project=.ci -e 'using JuliaFormatter; format(".")'
          if ! git diff --exit-code; then
            echo "❌ Code is not formatted!"
            echo "Please run: just format"
            exit 1
          fi
          echo "✅ Code is properly formatted"

  dendro:
    name: Dendro quality gate
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: julia-actions/install-juliaup@05d98a2ef433ca0723a8221e38c4723ea92b0c5f # v3.1.4
        with:
          channel: '1.12'
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0
      - name: Instantiate analysis environment
        run: julia --project=test/dendro -e 'using Pkg; Pkg.instantiate()'
      - name: Run Dendro over TreeSitter.jl source
        run: julia --project=test/dendro test/dendro/dendro.jl
